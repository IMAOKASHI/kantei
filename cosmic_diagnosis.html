<script>
// 年月日セレクト生成
const yearSel = document.getElementById('yearSelect');
const monthSel = document.getElementById('monthSelect');
const daySel = document.getElementById('daySelect');

const currentYear = new Date().getFullYear();
for (let y = currentYear - 10; y >= 1940; y--) {
  yearSel.innerHTML += `<option value="${y}">${y}年</option>`;
}
for (let m = 1; m <= 12; m++) {
  monthSel.innerHTML += `<option value="${m}">${m}月</option>`;
}
for (let d = 1; d <= 31; d++) {
  daySel.innerHTML += `<option value="${d}">${d}日</option>`;
}

// ライフパス数計算
function calcLifePath(y, m, d) {
  const digits = `${y}${m}${d}`.split('').map(Number);
  let sum = digits.reduce((a, b) => a + b, 0);
  while (sum > 9 && sum !== 11 && sum !== 22 && sum !== 33) {
    sum = sum.toString().split('').map(Number).reduce((a, b) => a + b, 0);
  }
  return sum;
}

// 太陽星座計算
function calcSunSign(m, d) {
  const signs = [
    { name: '山羊座', en: 'Capricorn', end: [1, 19] },
    { name: '水瓶座', en: 'Aquarius', end: [2, 18] },
    { name: '魚座', en: 'Pisces', end: [3, 20] },
    { name: '牡羊座', en: 'Aries', end: [4, 19] },
    { name: '牡牛座', en: 'Taurus', end: [5, 20] },
    { name: '双子座', en: 'Gemini', end: [6, 20] },
    { name: '蟹座', en: 'Cancer', end: [7, 22] },
    { name: '獅子座', en: 'Leo', end: [8, 22] },
    { name: '乙女座', en: 'Virgo', end: [9, 22] },
    { name: '天秤座', en: 'Libra', end: [10, 22] },
    { name: '蠍座', en: 'Scorpio', end: [11, 21] },
    { name: '射手座', en: 'Sagittarius', end: [12, 21] },
    { name: '山羊座', en: 'Capricorn', end: [12, 31] },
  ];
  for (const s of signs) {
    if (m < s.end[0] || (m === s.end[0] && d <= s.end[1])) return s;
  }
  return signs[0];
}

// マヤ暦KIN番号計算（ツォルキン）
function calcKin(y, m, d) {
  const baseDate = new Date(1994, 6, 26); // KIN1の基準日
  const target = new Date(y, m - 1, d);
  const diff = Math.floor((target - baseDate) / (1000 * 60 * 60 * 24));
  let kin = ((diff % 260) + 260) % 260;
  if (kin === 0) kin = 260;

  const tones = ['磁気','月','電気','自己存在','倍音','リズム','共鳴','銀河','太陽','惑星','スペクトル','水晶','宇宙'];
  const seals = ['赤い竜','白い風','青い夜','黄色い種','赤い蛇','白い世界の橋渡し','青い手','黄色い星','赤い月','白い犬','青い猿','黄色い人','赤い空歩く者','白い魔法使い','青い鷲','黄色い戦士','赤い地球','白い鏡','青い嵐','黄色い太陽'];

  const tone = tones[(kin - 1) % 13];
  const seal = seals[(kin - 1) % 20];

  return { kin, tone, seal };
}

async function startDiagnosis() {
  const name = document.getElementById('nameInput').value.trim() || 'あなた';
  const y = parseInt(yearSel.value);
  const m = parseInt(monthSel.value);
  const d = parseInt(daySel.value);

  if (!y || !m || !d) {
    alert('生年月日を入力してください');
    return;
  }

  // UI切り替え
  document.getElementById('formSection').style.display = 'none';
  document.getElementById('loading').style.display = 'block';
  document.getElementById('errorMsg').style.display = 'none';
  document.getElementById('result').style.display = 'none';

  // 計算
  const lifePath = calcLifePath(y, m, d);
  const sunSign = calcSunSign(m, d);
  const maya = calcKin(y, m, d);

  const prompt = `あなたはCosmic Triforiaの占術師です。クール・知的・ミステリアスな文体で、以下の情報を持つ人物への診断リーディングを書いてください。

名前: ${name}
生年月日: ${y}年${m}月${d}日
数秘ライフパス数: ${lifePath}
西洋占星術 太陽星座: ${sunSign.name}（${sunSign.en}）
マヤ暦 KIN${maya.kin}: ${maya.tone}の${maya.seal}

以下のJSON形式のみで返してください：
{
  "title": "この人物を象徴する短いキャッチコピー（20字以内）",
  "numerology_text": "ライフパス${lifePath}についての深いリーディング（200字程度）",
  "astrology_text": "${sunSign.name}についての深いリーディング（200字程度）",
  "maya_text": "KIN${maya.kin} ${maya.tone}の${maya.seal}についての深いリーディング（200字程度）",
  "integration": "三つの叡智を統合したメッセージ。詩的で本質を突く言葉で（300字程度）",
  "article_keyword": "関連記事検索用キーワード（例: 数秘7 使命）"
}`;

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{ role: 'user', content: prompt }]
      })
    });

    const data = await response.json();
    const text = data.content.map(i => i.text || '').join('');

    let result;
    try {
      result = JSON.parse(text.replace(/```json|```/g, '').trim());
    } catch {
      throw new Error('parse error');
    }

    // 結果表示
    document.getElementById('loading').style.display = 'none';
    document.getElementById('result').style.display = 'block';

    document.getElementById('resultName').textContent = name + ' さんへ';
    document.getElementById('resultTitle').textContent = result.title;
    document.getElementById('numerologyValue').textContent = `ライフパス ${lifePath}`;
    document.getElementById('numerologyText').textContent = result.numerology_text;
    document.getElementById('astrologyValue').textContent = sunSign.name;
    document.getElementById('astrologyText').textContent = result.astrology_text;
    document.getElementById('mayaValue').textContent = `KIN ${maya.kin} — ${maya.tone}の${maya.seal}`;
    document.getElementById('mayaText').textContent = result.maya_text;
    document.getElementById('integrationText').textContent = result.integration;

    // 記事リンク
    if (result.article_keyword) {
      document.getElementById('articleBtn').href = `/?s=${encodeURIComponent(result.article_keyword)}`;
    }

    window.scrollTo({ top: 0, behavior: 'smooth' });

  } catch (e) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('errorMsg').style.display = 'block';
    document.getElementById('formSection').style.display = 'block';
  }
}

function resetForm() {
  document.getElementById('result').style.display = 'none';
  document.getElementById('formSection').style.display = 'block';
  document.getElementById('nameInput').value = '';
  yearSel.value = '';
  monthSel.value = '';
  daySel.value = '';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
