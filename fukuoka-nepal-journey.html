<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>福岡 → ネパール</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Noto+Serif+JP:wght@300;400;700&display=swap" rel="stylesheet">
<style>
:root {
  --ocean:  #06111f;
  --land:   #0e2236;
  --land2:  #152d44;
  --border: #1e4060;
  --gold:   #c8a84b;
  --amber:  #e6c46a;
  --snow:   #edeae0;
  --dim:    rgba(200,168,75,.15);
  --nepal:  #1e4a2a;
}
* { margin:0; padding:0; box-sizing:border-box; }
html,body {
  width:100vw; height:100vh; overflow:hidden;
  background:var(--ocean);
  font-family:'Noto Serif JP',serif;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
}

/* ── Stars ── */
#stars{ position:fixed; inset:0; z-index:0; pointer-events:none; }
.star{
  position:absolute; border-radius:50%; background:#fff;
  animation:twinkle var(--d) ease-in-out infinite alternate;
  animation-delay:var(--dl);
}
@keyframes twinkle{ from{opacity:var(--a)} to{opacity:calc(var(--a)*.15)} }

/* ── Header ── */
#header{
  position:relative; z-index:10; text-align:center;
  margin-bottom:10px; opacity:0;
  animation:slideDown .9s ease forwards .1s;
}
#header .eyebrow{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(9px,1.1vw,11px);
  letter-spacing:.55em; color:var(--gold);
  text-transform:uppercase; margin-bottom:5px;
}
#header h1{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(22px,3.8vw,42px);
  font-weight:600; color:var(--snow); letter-spacing:.08em;
}
#header h1 em{ color:var(--gold); font-style:normal; }
@keyframes slideDown{
  from{opacity:0;transform:translateY(-12px)}
  to{opacity:1;transform:translateY(0)}
}

/* ── Map wrapper ── */
#map-wrap{
  position:relative; z-index:5;
  width:min(96vw,940px);
}
#map-svg{ width:100%; height:auto; display:block; }

/* ── SVG animations ── */

/* route segments */
.rseg{
  fill:none; stroke:var(--gold); stroke-width:1.6;
  stroke-dasharray:7 5; opacity:0;
  stroke-dashoffset:700;
}
.rglow{
  fill:none; stroke:var(--amber); stroke-width:4;
  opacity:0; filter:url(#glow);
  stroke-dasharray:700; stroke-dashoffset:700;
}
.s1 { animation:drawSeg 2.0s ease forwards 1.0s; }
.s1g{ animation:drawSegG 2.0s ease forwards 1.0s; }
.s2 { animation:drawSeg 1.6s ease forwards 3.6s; }
.s2g{ animation:drawSegG 1.6s ease forwards 3.6s; }
@keyframes drawSeg{
  0%  {opacity:0;stroke-dashoffset:700}
  5%  {opacity:.7}
  100%{opacity:.7;stroke-dashoffset:0}
}
@keyframes drawSegG{
  0%  {opacity:0;stroke-dashoffset:700}
  5%  {opacity:.3}
  100%{opacity:.3;stroke-dashoffset:0}
}

/* city dots */
.cdot{
  fill:var(--gold); filter:url(#glow); opacity:0;
  animation:popIn .45s ease forwards;
}
.cring{
  fill:none; stroke:var(--gold); stroke-width:1.2; opacity:0;
  animation:popIn .4s ease forwards, ringOut 3s ease-out infinite;
}
@keyframes popIn{from{opacity:0}to{opacity:1}}
@keyframes ringOut{0%{r:9;opacity:.6}100%{r:26;opacity:0}}

.cf .cdot,.cf .cring{ animation-delay:.7s,1.1s; }
.cb .cdot,.cb .cring{ animation-delay:3.0s,3.4s; }
.ck .cdot,.ck .cring{ animation-delay:5.2s,5.6s; }

/* labels */
.clbl{
  font-family:'Cormorant Garamond',serif; font-size:11px;
  fill:var(--snow); letter-spacing:.08em; opacity:0;
  animation:fadeIn .6s ease forwards;
}
.clbl-jp{
  font-family:'Noto Serif JP',serif; font-size:9px;
  fill:var(--amber); opacity:0;
  animation:fadeIn .6s ease forwards;
}
.cf .clbl,.cf .clbl-jp{ animation-delay:.9s; }
.cb .clbl,.cb .clbl-jp{ animation-delay:3.2s; }
.ck .clbl,.ck .clbl-jp{ animation-delay:5.4s; }
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

/* Nepal highlight */
#nepal-hl{
  opacity:0;
  animation:fadeIn 1s ease forwards 5.5s;
}

/* ── Plane ── */
#plane{
  position:absolute; font-size:clamp(17px,2.2vw,23px);
  opacity:0; pointer-events:none; z-index:20;
  transform-origin:50% 50%; line-height:1;
}

/* ── Info strip ── */
#info{
  position:relative; z-index:10;
  display:flex; align-items:center;
  gap:clamp(10px,2.2vw,28px);
  margin-top:10px; opacity:0;
  animation:slideUp .9s ease forwards 6.2s;
}
@keyframes slideUp{
  from{opacity:0;transform:translateY(10px)}
  to{opacity:1;transform:translateY(0)}
}
.ic{ text-align:center; }
.ic .v{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(14px,2.1vw,22px);
  color:var(--amber); line-height:1;
}
.ic .l{
  font-size:clamp(7px,.9vw,9.5px);
  color:var(--gold); letter-spacing:.22em;
  text-transform:uppercase; margin-top:3px;
}
.sep{
  width:1px; height:32px; align-self:center;
  background:linear-gradient(to bottom,transparent,var(--gold),transparent);
  opacity:.3;
}
</style>
</head>
<body>
<div id="stars"></div>

<div id="header">
  <div class="eyebrow">Journey to the Himalayas</div>
  <h1>福岡 <em>✈</em> ネパール</h1>

<!--
COORDINATE SYSTEM  (matches reference map image proportions)
ViewBox: 0 0 860 480

Lon range: 68°E → 148°E  → x = (lon-68)/(148-68)*860 = (lon-68)*10.75
Lat range: 0°N  → 45°N   → y = (45-lat)/(45-0)*480  = (45-lat)*10.667

Key cities:
  Fukuoka  lon=130.4 lat=33.6  → x=671  y=122
  Bangkok  lon=100.5 lat=13.7  → x=351  y=333
  Kathmandu lon=85.3 lat=27.7  → x=185  y=185

  Seoul    lon=126.9 lat=37.5  → x=633  y=80   (reference)
  HongKong lon=114.2 lat=22.3  → x=498  y=242  (reference)

</defs>

<rect width="860" height="480" fill="url(#bg)"/>

  <line x1="667" y1="0" x2="667" y2="480"/> <!-- 130° -->
  <line x1="774" y1="0" x2="774" y2="480"/> <!-- 140° -->
  <!-- lat lines every 10° -->

  <line x1="0" y1="160" x2="860" y2="160"/> <!-- 30° -->

  <text x="663" y="475">130°E</text><text x="770" y="475">140°E</text>
</g>

<script>
// ── Stars ──
const sc = document.getElementById('stars');
for(let i=0;i<220;i++){
  const s=document.createElement('div');
  s.className='star';
  const sz=Math.random()*1.9+.3;
  s.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*100}%;width:${sz}px;height:${sz}px;--a:${.18+Math.random()*.75};--d:${1.4+Math.random()*4}s;--dl:${Math.random()*6}s;`;
  sc.appendChild(s);
}

// ── Plane animation ──
// SVG coords: FUK(671,122)  BKK(351,333)  KTM(185,185)
// Bezier ctrl: cp1(540,190) cp2(280,225)
// ViewBox: 860×480

const plane=document.getElementById('plane');
const wrap=document.getElementById('map-wrap');

function qb(p0,cp,p1,t){
  const m=1-t;
  return{x:m*m*p0.x+2*m*t*cp.x+t*t*p1.x, y:m*m*p0.y+2*m*t*cp.y+t*t*p1.y};
}
function ang(a,b){ return Math.atan2(b.y-a.y,b.x-a.x)*180/Math.PI; }
function place(sx,sy,deg){
  const rect=wrap.getBoundingClientRect();
  // scale from viewBox to rendered size
  const svgW=860, svgH=480;
  const scaleX=rect.width/svgW, scaleY=rect.height/svgH;
  plane.style.left=(sx*scaleX)+'px';
  plane.style.top =(sy*scaleY)+'px';
  plane.style.transform=`translate(-50%,-50%) rotate(${deg}deg)`;
}

const fuk={x:671,y:122}, bkk={x:351,y:333}, ktm={x:185,y:185};
const cp1={x:540,y:190}, cp2={x:280,y:225};
const L1S=1000,L1D=2200, L2S=3700,L2D=1800;
let t0=null;

function anim(ts){
  if(!t0)t0=ts;
  const el=ts-t0;
  if(el>=L1S && el<L1S+L1D){
    const t=Math.min((el-L1S)/L1D,1);
    const c=qb(fuk,cp1,bkk,t), n=qb(fuk,cp1,bkk,Math.min(t+.015,1));
    plane.style.opacity='1'; place(c.x,c.y,ang(c,n));
  } else if(el>=L2S && el<L2S+L2D){
    const t=Math.min((el-L2S)/L2D,1);
    const c=qb(bkk,cp2,ktm,t), n=qb(bkk,cp2,ktm,Math.min(t+.015,1));
    plane.style.opacity='1'; place(c.x,c.y,ang(c,n));
  } else if(el<L1S){
    plane.style.opacity='0';
  }
  if(el<L2S+L2D+400) requestAnimationFrame(anim);
}
requestAnimationFrame(anim);
</script>
</body>
</html>
